<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>torch-pyodide playground</title>
    <style>
      :root {
        color-scheme: light;
        --bg-a: #f8fafc;
        --bg-b: #e2e8f0;
        --ink: #0f172a;
        --panel: #ffffffcc;
        --border: #cbd5e1;
        --accent: #0f766e;
        --accent-hover: #115e59;
        --console-bg: #0b1220;
        --console-border: #1e293b;
        --console-fg: #dbeafe;
        --console-muted: #94a3b8;
        --console-error: #fca5a5;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background: radial-gradient(1200px 500px at 20% -10%, #dbeafe, transparent 60%),
                    radial-gradient(900px 500px at 100% 0%, #ccfbf1, transparent 55%),
                    linear-gradient(135deg, var(--bg-a), var(--bg-b));
        color: var(--ink);
      }
      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 20px;
        height: 100dvh;
        min-height: 0;
        box-sizing: border-box;
        display: grid;
        gap: 12px;
        grid-template-rows: auto auto minmax(0, 1fr);
        overflow: hidden;
      }
      h1 { margin: 0; font-size: 1.35rem; letter-spacing: 0.01em; }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .panes {
        min-height: 0;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 12px;
      }
      .panel {
        background: var(--panel);
        backdrop-filter: blur(5px);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        min-height: 0;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
      }
      .panel-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        color: #334155;
      }
      #editor {
        min-height: 0;
        height: 100%;
        border: 1px solid #1f2937;
        border-radius: 8px;
        overflow: hidden;
      }
      #editor .cm-editor {
        height: 100%;
        min-height: 0;
      }
      #editor .cm-scroller {
        height: 100%;
        min-height: 0;
        overflow: auto;
      }
      .console-frame {
        min-height: 0;
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid var(--console-border);
        border-radius: 8px;
        background: var(--console-bg);
        box-shadow: inset 0 1px 0 #ffffff12;
      }
      .console-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 0 10px;
        border-bottom: 1px solid #1e293b;
        background: #111827;
        color: var(--console-muted);
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 12px;
      }
      .console-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 14px 0 0 #eab308, 28px 0 0 #ef4444;
        margin-right: 28px;
        flex: 0 0 auto;
      }
      .console-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .console-output {
        min-height: 0;
        height: 100%;
        overflow: auto;
        box-sizing: border-box;
        padding: 12px 14px;
        color: var(--console-fg);
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        tab-size: 2;
      }
      .console-output::selection {
        background: #38bdf866;
      }
      .console-output.is-empty {
        color: var(--console-muted);
      }
      .console-output.is-running {
        color: #bfdbfe;
      }
      .console-output.is-error {
        color: var(--console-error);
      }
      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 8px 14px;
        cursor: pointer;
      }
      button:hover { background: var(--accent-hover); }
      button:disabled { opacity: 0.5; cursor: default; }
      .row { display: flex; gap: 8px; align-items: center; }
      select {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
        color: #0f172a;
        font-size: 0.9rem;
      }
      select:disabled {
        opacity: 0.5;
      }
      .muted { color: #475569; font-size: 0.9rem; }
      .gpu-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #ecfeff;
        border: 1px solid #99f6e4;
        color: #134e4a;
        font-size: 0.86rem;
        max-width: 100%;
      }
      .gpu-chip strong {
        color: #0f766e;
        white-space: nowrap;
      }
      .gpu-chip span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (max-width: 960px) {
        .wrap {
          height: 100dvh;
          grid-template-rows: auto auto minmax(0, 1fr);
          padding: 14px;
        }
        .panes {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) minmax(180px, 0.65fr);
        }
        #editor {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>torch-pyodide playground</h1>
      <div class="toolbar">
        <div class="row">
          <button id="run">Run</button>
          <button id="reset">Reset</button>
          <select id="example-select" aria-label="Choose example" disabled></select>
        </div>
        <div class="muted" id="meta">Booting...</div>
        <div class="gpu-chip" id="gpu-chip"><strong>GPU</strong><span id="gpu-label">Detecting...</span></div>
      </div>
      <section class="panes">
        <article class="panel">
          <h2 class="panel-title">Editor</h2>
          <div id="editor"></div>
        </article>
        <article class="panel">
          <h2 class="panel-title">Output</h2>
          <div class="console-frame" aria-label="Console output">
            <div class="console-toolbar" aria-hidden="true">
              <span class="console-dot"></span>
              <span class="console-title">stdout</span>
            </div>
            <div id="output" class="console-output is-empty" role="log" aria-live="polite">(no output yet)</div>
          </div>
        </article>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
