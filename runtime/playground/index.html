<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>torch-pyodide playground</title>
    <style>
      :root {
        color-scheme: light;
        --bg-a: #f8fafc;
        --bg-b: #e2e8f0;
        --ink: #0f172a;
        --panel: #ffffffcc;
        --border: #cbd5e1;
        --accent: #0f766e;
        --accent-hover: #115e59;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background: radial-gradient(1200px 500px at 20% -10%, #dbeafe, transparent 60%),
                    radial-gradient(900px 500px at 100% 0%, #ccfbf1, transparent 55%),
                    linear-gradient(135deg, var(--bg-a), var(--bg-b));
        color: var(--ink);
      }
      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        box-sizing: border-box;
        display: grid;
        gap: 12px;
        grid-template-rows: auto auto minmax(0, 1fr);
      }
      h1 { margin: 0; font-size: 1.35rem; letter-spacing: 0.01em; }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .panes {
        min-height: 0;
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 12px;
      }
      .panel {
        background: var(--panel);
        backdrop-filter: blur(5px);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
      }
      .panel-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        color: #334155;
      }
      #editor {
        min-height: 0;
        height: 100%;
        border: 1px solid #1f2937;
        border-radius: 8px;
        overflow: hidden;
      }
      pre {
        margin: 0;
        height: 100%;
        min-height: 0;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
        background: #f8fafc;
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 13px;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 8px 14px;
        cursor: pointer;
      }
      button:hover { background: var(--accent-hover); }
      button:disabled { opacity: 0.5; cursor: default; }
      .row { display: flex; gap: 8px; align-items: center; }
      .muted { color: #475569; font-size: 0.9rem; }
      .gpu-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #ecfeff;
        border: 1px solid #99f6e4;
        color: #134e4a;
        font-size: 0.86rem;
        max-width: 100%;
      }
      .gpu-chip strong {
        color: #0f766e;
        white-space: nowrap;
      }
      .gpu-chip span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (max-width: 960px) {
        .wrap {
          min-height: auto;
          grid-template-rows: auto auto auto;
        }
        .panes {
          grid-template-columns: 1fr;
        }
        #editor {
          min-height: 360px;
        }
        pre {
          min-height: 240px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>torch-pyodide playground</h1>
      <div class="toolbar">
        <div class="row">
          <button id="run">Run</button>
          <button id="reset">Reset</button>
        </div>
        <div class="muted" id="meta">Booting...</div>
        <div class="gpu-chip" id="gpu-chip"><strong>GPU</strong><span id="gpu-label">Detecting...</span></div>
      </div>
      <section class="panes">
        <article class="panel">
          <h2 class="panel-title">Editor</h2>
          <div id="editor"></div>
        </article>
        <article class="panel">
          <h2 class="panel-title">Output</h2>
          <pre id="output"></pre>
        </article>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
