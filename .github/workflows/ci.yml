name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test/build tooling
        run: python -m pip install --upgrade pip pytest build

      - name: Install deps
        run: npm ci

      - name: Validate WGSL shader entrypoints
        run: npm --workspace runtime run validate:shaders

      - name: Validate runtime API against Python layer
        run: npm --workspace runtime run validate:api

      - name: Validate imports (no dangling references to unimported constants)
        run: npm --workspace runtime run validate:imports

      - name: Setup Pyodide dist
        run: npm run setup:pyodide:dist

      - name: Build runtime
        run: npm run build:runtime

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:browser

      - name: Run python tests
        run: npm run test:python

      - name: Check compatibility report is up to date
        run: |
          python python/compatibility/report.py
          git diff --exit-code -- python/compatibility/report.md python/compatibility/report.json

      - name: Build wheel
        run: npm run build:wheel

      - name: Smoke test wheel install
        run: |
          python -m venv .venv-wheel-smoke
          . .venv-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install python/dist/*.whl
          python -c "import torch; print(torch.__all__)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: python/dist/*.whl

  publish:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Auto-bump patch version
        run: |
          python -c "
import re
with open('python/pyproject.toml') as f:
    content = f.read()
version = re.search(r'^version = \"(\\d+\\.\\d+\\.)(\\d+)\"', content, re.M)
major_minor = version.group(1)
patch = int(version.group(2)) + 1
content = content.replace(version.group(0), f'version = \"{major_minor}{patch}\"')
with open('python/pyproject.toml', 'w') as f:
    f.write(content)
print(f'Bumped to {major_minor}{patch}')
"

      - name: Build wheel
        run: python -m pip install --upgrade build && cd python && python -m build

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add python/pyproject.toml
          git commit -m "Bump version to $(python -c "import re; print(re.search(r'^version = \"(.+?)\"', open('python/pyproject.toml').read(), re.M).group(1))")"
          git push

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
