---

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Check wheel/runtime version parity
        run: npm run check:release:parity

      - name: Setup Pyodide dist
        run: npm run setup:pyodide:dist

      - name: Build runtime
        env:
          VITE_BASE_PATH: /torch-pyodide/
        run: npm run build:runtime

      - name: Build distribution runtime
        run: npm run build:runtime:distribution

      - name: Generate release metadata (runtime + manifests + hashes)
        env:
          RELEASE_PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          RELEASE_PRESERVE_PRIOR_VERSIONS: "1"
          PYPI_MAX_ATTEMPTS: "40"
          PYPI_RETRY_DELAY_MS: "15000"
        run: npm run build:release:metadata

      - name: Verify release metadata integrity
        env:
          RELEASE_MANIFEST_PATH: runtime/dist-channel/latest.json
        run: >-
          VERSION=$(node -e "const fs=require('node:fs');const m=fs.readFileSync('python/pyproject.toml','utf8').match(/^\\s*version\\s*=\\s*\"([^\"]+)\"/m);if(!m){process.exit(1)}process.stdout.write(m[1]);")
          && RELEASE_RUNTIME_LOCAL_PATH="runtime/dist-channel/runtime/$VERSION/runtime.mjs"
          npm run verify:release:metadata

      - name: Merge distribution artifacts into Pages bundle
        run: cp -r runtime/dist-channel/. runtime/dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke test manifest-based client flow
        run: |
          python3 -m http.server 4180 --directory runtime/dist >/tmp/pages-smoke-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          MANIFEST_BASE_URL=http://127.0.0.1:4180 \
          MANIFEST_FORCE_RUNTIME_BASE_URL=http://127.0.0.1:4180 \
          npm run smoke:manifest-client

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: runtime/dist

  deploy:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
