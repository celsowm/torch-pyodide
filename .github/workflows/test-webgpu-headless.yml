name: WebGPU Headless Experiment

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-webgpu-headless:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Vulkan/Mesa software drivers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvulkan1 mesa-vulkan-drivers vulkan-tools
          vulkaninfo --summary

      - name: Install deps
        run: npm ci

      - name: Setup Pyodide dist
        run: npm run setup:pyodide:dist

      - name: Build runtime
        run: npm run build:runtime

      - name: Install Playwright browsers (chromium full, not headless-shell)
        run: npx playwright install --with-deps chromium

      - name: Test WebGPU detection with chromium full (not headless-shell)
        run: |
          cat > runtime/test-webgpu.mjs << 'EOF'
          import { chromium } from 'playwright';

          const configs = [
            {
              name: 'chromium headless=new with Mesa Vulkan',
              args: [
                '--headless=new',
                '--enable-unsafe-webgpu',
                '--enable-features=Vulkan,UseSkiaRenderer',
                '--use-gl=egl',
                '--no-sandbox',
                '--disable-gpu-sandbox',
              ]
            },
            {
              name: 'chromium headless=new ANGLE SwiftShader',
              args: [
                '--headless=new',
                '--enable-unsafe-webgpu',
                '--enable-features=Vulkan,UseSkiaRenderer',
                '--use-gl=angle',
                '--use-angle=swiftshader',
                '--no-sandbox',
              ]
            },
            {
              name: 'chromium headless=new no GL override',
              args: [
                '--headless=new',
                '--enable-unsafe-webgpu',
                '--enable-features=Vulkan,UseSkiaRenderer',
                '--no-sandbox',
              ]
            },
          ];

          for (const cfg of configs) {
            console.log(`\n=== ${cfg.name} ===`);
            try {
              const browser = await chromium.launch({
                headless: true,
                args: cfg.args,
              });
              const page = await browser.newPage();
              await page.goto('about:blank');
              const result = await page.evaluate(async () => {
                if (!navigator.gpu) return { gpu: false, error: 'navigator.gpu is undefined' };
                try {
                  const adapter = await navigator.gpu.requestAdapter();
                  if (!adapter) return { gpu: true, adapter: false, error: 'requestAdapter returned null' };
                  const device = await adapter.requestDevice();
                  const info = {
                    name: adapter.name,
                    features: Array.from(adapter.features).join(', '),
                    deviceCreated: !!device,
                  };
                  return { gpu: true, adapter: true, info };
                } catch (e) {
                  return { gpu: true, adapter: false, error: e.message };
                }
              });
              console.log(JSON.stringify(result, null, 2));
              await browser.close();
              if (result.gpu && result.adapter) {
                console.log('✓ SUCCESS: WebGPU is available!');
                process.exit(0);
              }
            } catch (e) {
              console.log(`Launch error: ${e.message}`);
            }
          }

          console.log('\n✗ All approaches failed. WebGPU not available in headless mode.');
          process.exit(1);
          EOF
          node runtime/test-webgpu.mjs

      - name: Summary
        run: |
          echo "## WebGPU Headless Test Results" >> $GITHUB_STEP_SUMMARY
          echo "See step logs above for detailed results." >> $GITHUB_STEP_SUMMARY
