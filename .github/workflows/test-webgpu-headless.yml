name: WebGPU Headless Experiment

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-webgpu-headless:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Vulkan/Mesa software drivers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvulkan1 mesa-vulkan-drivers vulkan-tools
          vulkaninfo --summary

      - name: Install deps
        run: npm ci

      - name: Setup Pyodide dist
        run: npm run setup:pyodide:dist

      - name: Build runtime
        run: npm run build:runtime

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test WebGPU detection in headless Chrome
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: [
                '--headless=new',
                '--enable-unsafe-webgpu',
                '--enable-features=Vulkan,UseSkiaRenderer',
                '--use-gl=egl',
                '--no-sandbox',
              ]
            });
            const page = await browser.newPage();
            await page.goto('about:blank');
            const result = await page.evaluate(async () => {
              if (!navigator.gpu) return { gpu: false, error: 'navigator.gpu is undefined' };
              try {
                const adapter = await navigator.gpu.requestAdapter();
                if (!adapter) return { gpu: true, adapter: false, error: 'requestAdapter returned null' };
                const info = {
                  name: adapter.name,
                  features: Array.from(adapter.features).join(', '),
                  limits: JSON.stringify(Object.fromEntries(
                    Object.entries(adapter.limits).map(([k, v]) => [k, String(v)])
                  )),
                };
                return { gpu: true, adapter: true, info };
              } catch (e) {
                return { gpu: true, adapter: false, error: e.message };
              }
            });
            console.log(JSON.stringify(result, null, 2));
            await browser.close();
            if (!result.gpu || !result.adapter) {
              process.exit(1);
            }
          })();
          "
          # Convert to ESM for .mjs or use dynamic import
          # Actually let's just use a .mjs file

      - name: Test WebGPU detection (mjs version)
        run: |
          cat > /tmp/test-webgpu.mjs << 'EOF'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({
            headless: true,
            args: [
              '--headless=new',
              '--enable-unsafe-webgpu',
              '--enable-features=Vulkan,UseSkiaRenderer',
              '--use-gl=egl',
              '--no-sandbox',
            ]
          });
          const page = await browser.newPage();
          await page.goto('about:blank');
          const result = await page.evaluate(async () => {
            if (!navigator.gpu) return { gpu: false, error: 'navigator.gpu is undefined' };
            try {
              const adapter = await navigator.gpu.requestAdapter();
              if (!adapter) return { gpu: true, adapter: false, error: 'requestAdapter returned null' };
              const info = {
                name: adapter.name,
                features: Array.from(adapter.features).join(', '),
                limits: JSON.stringify(Object.fromEntries(
                  Object.entries(adapter.limits).map(([k, v]) => [k, String(v)])
                )),
              };
              return { gpu: true, adapter: true, info };
            } catch (e) {
              return { gpu: true, adapter: false, error: e.message };
            }
          });
          console.log(JSON.stringify(result, null, 2));
          await browser.close();
          if (!result.gpu || !result.adapter) {
            process.exit(1);
          }
          EOF
          node /tmp/test-webgpu.mjs

      - name: Try with SwiftShader flags
        run: |
          cat > /tmp/test-webgpu-swiftshader.mjs << 'EOF'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({
            headless: true,
            args: [
              '--headless=new',
              '--enable-unsafe-webgpu',
              '--enable-features=Vulkan,UseSkiaRenderer',
              '--use-gl=angle --use-angle=swiftshader',
              '--no-sandbox',
            ]
          });
          const page = await browser.newPage();
          await page.goto('about:blank');
          const result = await page.evaluate(async () => {
            if (!navigator.gpu) return { gpu: false, error: 'navigator.gpu is undefined' };
            try {
              const adapter = await navigator.gpu.requestAdapter();
              if (!adapter) return { gpu: true, adapter: false, error: 'requestAdapter returned null' };
              const info = {
                name: adapter.name,
                features: Array.from(adapter.features).join(', '),
                limits: JSON.stringify(Object.fromEntries(
                  Object.entries(adapter.limits).map(([k, v]) => [k, String(v)])
                )),
              };
              return { gpu: true, adapter: true, info };
            } catch (e) {
              return { gpu: true, adapter: false, error: e.message };
            }
          });
          console.log(JSON.stringify(result, null, 2));
          await browser.close();
          if (!result.gpu || !result.adapter) {
            process.exit(1);
          }
          EOF
          node /tmp/test-webgpu-swiftshader.mjs || echo "SwiftShader approach failed (expected to fail)"

      - name: Try with Mesa lavapipe override
        run: |
          cat > /tmp/test-webgpu-lavapipe.mjs << 'EOF'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({
            headless: true,
            args: [
              '--headless=new',
              '--enable-unsafe-webgpu',
              '--enable-features=Vulkan,UseSkiaRenderer',
              '--use-gl=egl',
              '--no-sandbox',
            ]
          });
          const page = await browser.newPage();
          await page.goto('about:blank');
          const result = await page.evaluate(async () => {
            if (!navigator.gpu) return { gpu: false, error: 'navigator.gpu is undefined' };
            try {
              const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'low-power' });
              if (!adapter) return { gpu: true, adapter: false, error: 'requestAdapter returned null' };
              const info = {
                name: adapter.name,
                features: Array.from(adapter.features).join(', '),
                limits: JSON.stringify(Object.fromEntries(
                  Object.entries(adapter.limits).map(([k, v]) => [k, String(v)])
                )),
              };
              // Try creating device to confirm it works
              const device = await adapter.requestDevice();
              const deviceInfo = {
                label: device.label,
                features: Array.from(device.features).join(', '),
              };
              return { gpu: true, adapter: true, info, device: deviceInfo };
            } catch (e) {
              return { gpu: true, adapter: false, error: e.message };
            }
          });
          console.log(JSON.stringify(result, null, 2));
          await browser.close();
          if (!result.gpu || !result.adapter) {
            process.exit(1);
          }
          EOF
          VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json node /tmp/test-webgpu-lavapipe.mjs || echo "Lavapipe override failed too"

      - name: Summary
        run: |
          echo "## WebGPU Headless Test Results" >> $GITHUB_STEP_SUMMARY
          echo "See step logs above for detailed results." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All approaches tested. Check which one works." >> $GITHUB_STEP_SUMMARY
