name: WebGPU Headless Experiment

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-webgpu-headless:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Vulkan/Mesa software drivers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvulkan1 mesa-vulkan-drivers vulkan-tools
          vulkaninfo --summary

      - name: Install Google Chrome (via browser-tools action)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install deps
        run: npm ci

      - name: Setup Pyodide dist
        run: npm run setup:pyodide:dist

      - name: Build runtime
        run: npm run build:runtime

      - name: Install Playwright browsers (for browser deps only)
        run: npx playwright install --with-deps chromium

      - name: Test WebGPU in various modes
        run: node runtime/test-webgpu-gh.mjs

      - name: Summary
        run: echo "## WebGPU Headless Test Results" >> $GITHUB_STEP_SUMMARY
