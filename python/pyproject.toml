[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "torch-pyodide"
version = "0.0.14"
description = "PyTorch-compatible module for the browser with full autograd and runtime-backed backprop — via Pyodide + WebGPU."
requires-python = ">=3.11"
readme = "README.md"

[project.urls]
Homepage = "https://github.com/celsowm/torch-pyodide"
Repository = "https://github.com/celsowm/torch-pyodide"

[tool.setuptools]
packages = { find = { include = ["torch", "torch.*"] } }
